<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    Alternatively, build your application passing the --base-href parameter
    specifying the new root path of your web app.

    Fore more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Feed Bucket Monitor">

  

  <meta name="robots" content="noindex" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-hao.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-hao.png" />

  <!-- Open Graph & SEO tags -->
  <meta property="og:title" content="Feed Bucket Monitor" />
  <meta property="og:description" content="Monitoring and management dashboard for feed bucket operations." />
  <meta property="og:image" content="https://storage.googleapis.com/flutterflow-prod-hosting/og_splash_gradient.png" /> 
  <meta name="twitter:title" content="Feed Bucket Monitor" />
  <meta name="twitter:description" content="Monitoring and management dashboard for feed bucket operations." />
  <meta name="twitter:image" content="https://storage.googleapis.com/flutterflow-prod-hosting/og_splash_gradient.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Feed Bucket Monitor</title>
  <meta name="description" content="Monitoring and management dashboard for feed bucket operations." />
    

  <!-- Status Bar color in Safari browser (iOS) and PWA -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0B5CAD">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#123F76">

  <link rel="manifest" href="manifest.json">
  
</head>
<body>
  <script>
    (() => {
      if (!('serviceWorker' in navigator)) {
        return;
      }

      const appVersion = '__APP_VERSION__';
      const serviceWorkerUrl = `pwa_service_worker.js?v=${appVersion}`;
      let isReloadingForUpdate = false;

      const removeUpdateBanner = () => {
        document.getElementById('feed-bucket-update-banner')?.remove();
      };

      const requestActivation = (worker) => {
        worker?.postMessage({ type: 'SKIP_WAITING' });
      };

      const showUpdateBanner = (registration) => {
        if (!registration?.waiting) {
          return;
        }

        if (document.getElementById('feed-bucket-update-banner')) {
          return;
        }

        const banner = document.createElement('div');
        banner.id = 'feed-bucket-update-banner';
        banner.style.position = 'fixed';
        banner.style.left = '16px';
        banner.style.right = '16px';
        banner.style.bottom = '16px';
        banner.style.zIndex = '9999';
        banner.style.display = 'flex';
        banner.style.alignItems = 'center';
        banner.style.justifyContent = 'space-between';
        banner.style.gap = '12px';
        banner.style.padding = '14px 16px';
        banner.style.borderRadius = '16px';
        banner.style.background = 'rgba(11, 92, 173, 0.96)';
        banner.style.color = '#FFFFFF';
        banner.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.18)';
        banner.style.backdropFilter = 'blur(10px)';

        const message = document.createElement('div');
        message.textContent = '偵測到新版本，按下更新後會重新載入頁面。';
        message.style.fontSize = '14px';
        message.style.lineHeight = '1.4';

        const actionGroup = document.createElement('div');
        actionGroup.style.display = 'flex';
        actionGroup.style.alignItems = 'center';
        actionGroup.style.gap = '8px';

        const laterButton = document.createElement('button');
        laterButton.type = 'button';
        laterButton.textContent = '稍後';
        laterButton.style.border = '0';
        laterButton.style.borderRadius = '999px';
        laterButton.style.padding = '9px 14px';
        laterButton.style.background = 'rgba(255, 255, 255, 0.18)';
        laterButton.style.color = '#FFFFFF';
        laterButton.style.cursor = 'pointer';
        laterButton.onclick = removeUpdateBanner;

        const updateButton = document.createElement('button');
        updateButton.type = 'button';
        updateButton.textContent = '立即更新';
        updateButton.style.border = '0';
        updateButton.style.borderRadius = '999px';
        updateButton.style.padding = '9px 14px';
        updateButton.style.background = '#FFFFFF';
        updateButton.style.color = '#0B5CAD';
        updateButton.style.fontWeight = '700';
        updateButton.style.cursor = 'pointer';
        updateButton.onclick = () => {
          updateButton.disabled = true;
          updateButton.textContent = '更新中...';
          requestActivation(registration.waiting);
        };

        actionGroup.appendChild(laterButton);
        actionGroup.appendChild(updateButton);
        banner.appendChild(message);
        banner.appendChild(actionGroup);
        document.body.appendChild(banner);
      };

      const monitorRegistration = (registration) => {
        if (!registration) {
          return;
        }

        if (!navigator.serviceWorker.controller && registration.waiting) {
          requestActivation(registration.waiting);
        } else if (registration.waiting) {
          showUpdateBanner(registration);
        }

        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          if (!newWorker) {
            return;
          }

          newWorker.addEventListener('statechange', () => {
            if (newWorker.state !== 'installed') {
              return;
            }

            if (!navigator.serviceWorker.controller) {
              requestActivation(registration.waiting ?? newWorker);
              return;
            }

            showUpdateBanner(registration);
          });
        });
      };

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (isReloadingForUpdate) {
          return;
        }

        isReloadingForUpdate = true;
        removeUpdateBanner();
        window.location.reload();
      });

      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register(
            serviceWorkerUrl,
          );

          monitorRegistration(registration);
          setInterval(() => registration.update(), 60000);

          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
              registration.update();
            }
          });
        } catch (error) {
          console.warn('PWA service worker registration failed:', error);
        }
      });
    })();
  </script>
  <script>
    {{flutter_bootstrap_js}}
  </script>
</body>
</html>
